repos:
  - repo: local
    hooks:
      - id: go-lint
        name: go lint
        entry: make lint
        language: system
        pass_filenames: false
        files: '(^|/)(go\.mod|go\.sum)$|\.go$'

      - id: go-test
        name: go test
        entry: make test
        language: system
        pass_filenames: false
        files: '(^|/)(go\.mod|go\.sum)$|\.go$'
